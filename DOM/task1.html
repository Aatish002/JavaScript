<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=
    , initial-scale=1.0"
    />
    <title>Document</title>
  </head>
  <body>
    <h1>List</h1>
    <ul id="ul">
      <li>Java Script</li>
    </ul>
  </body>
  <script>
    function listItem(i) {
      const ul = document.querySelector("#ul");
      const li = document.createElement("li");
      li.textContent = i;
      console.log(li.outerHTML);
      ul.appendChild(li);
    }
    listItem("Python");
    listItem("C");
    listItem("C+");
  </script>
</html>
